<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PolyCafe HRM - Quản lý lớp học/nhân sự</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">PolyCafe HRM</a>
      <span class="navbar-text text-white-50">Ứng dụng quản lý theo yêu cầu RQ01-RQ16</span>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row g-4">
      <div class="col-12 col-lg-4">
        <div class="card shadow-sm">
          <div class="card-header bg-white">
            <h5 class="mb-0">Đăng ký tài khoản</h5>
          </div>
          <div class="card-body">
            <form id="registerForm" class="vstack gap-3">
              <input class="form-control" id="regName" placeholder="Họ tên" required>
              <input class="form-control" id="regEmail" type="email" placeholder="Email" required>
              <input class="form-control" id="regPassword" type="password" minlength="6" placeholder="Mật khẩu" required>
              <select class="form-select" id="regCountry" required>
                <option value="">-- Chọn quốc gia --</option>
                <option value="Vietnam">Việt Nam</option>
                <option value="Japan">Nhật Bản</option>
                <option value="Singapore">Singapore</option>
                <option value="USA">Hoa Kỳ</option>
              </select>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="countryConfirm">
                <label class="form-check-label" for="countryConfirm">
                  Tôi xác nhận quốc gia đã chọn là chính xác
                </label>
              </div>
              <select class="form-select" id="regRole">
                <option value="admin">Quản trị viên</option>
                <option value="hr" selected>Nhân sự</option>
                <option value="manager">Quản lý</option>
              </select>
              <button class="btn btn-primary" type="submit">Đăng ký</button>
            </form>
            <hr>
            <form id="loginForm" class="vstack gap-3">
              <h6 class="mb-0">Đăng nhập (RQ01)</h6>
              <input class="form-control" id="loginEmail" type="email" placeholder="Email" required>
              <input class="form-control" id="loginPassword" type="password" placeholder="Mật khẩu" required>
              <button class="btn btn-outline-primary" type="submit">Đăng nhập</button>
            </form>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-8">
        <div class="card shadow-sm">
          <div class="card-body">
            <div id="currentUser" class="alert alert-info py-2 mb-3">Chưa đăng nhập</div>

            <ul class="nav nav-tabs" id="mainTabs" role="tablist">
              <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#users">Tài khoản</button></li>
              <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#org">Phòng ban & chức vụ</button></li>
              <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#employees">Nhân viên</button></li>
              <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#contracts">Hợp đồng</button></li>
              <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#reports">Báo cáo</button></li>
            </ul>

            <div class="tab-content pt-3">
              <section class="tab-pane fade show active" id="users">
                <h6>RQ02, RQ03 - Quản lý tài khoản & phân quyền</h6>
                <div class="table-responsive">
                  <table class="table table-sm align-middle" id="usersTable"></table>
                </div>
              </section>

              <section class="tab-pane fade" id="org">
                <div class="row g-3">
                  <div class="col-md-6">
                    <h6>RQ04 - Phòng ban</h6>
                    <form id="departmentForm" class="input-group mb-2">
                      <input class="form-control" id="departmentInput" placeholder="Tên phòng ban" required>
                      <button class="btn btn-outline-secondary">Thêm</button>
                    </form>
                    <ul class="list-group" id="departmentList"></ul>
                  </div>
                  <div class="col-md-6">
                    <h6>RQ05 - Chức vụ</h6>
                    <form id="positionForm" class="input-group mb-2">
                      <input class="form-control" id="positionInput" placeholder="Tên chức vụ" required>
                      <button class="btn btn-outline-secondary">Thêm</button>
                    </form>
                    <ul class="list-group" id="positionList"></ul>
                  </div>
                </div>
              </section>

              <section class="tab-pane fade" id="employees">
                <h6>RQ06-RQ11, RQ14-RQ15</h6>
                <form id="employeeForm" class="row g-2 mb-3">
                  <div class="col-md-3"><input class="form-control" id="empCode" placeholder="Mã NV" required></div>
                  <div class="col-md-3"><input class="form-control" id="empName" placeholder="Tên NV" required></div>
                  <div class="col-md-3"><select class="form-select" id="empDepartment"></select></div>
                  <div class="col-md-3"><select class="form-select" id="empPosition"></select></div>
                  <div class="col-md-3"><select class="form-select" id="empStatus"><option>Đang làm</option><option>Thử việc</option><option>Nghỉ việc</option></select></div>
                  <div class="col-md-3"><input class="form-control" id="empInsurance" placeholder="Mã BHXH"></div>
                  <div class="col-md-3"><input class="form-control" id="empLeave" type="number" min="0" value="12" placeholder="Ngày phép"></div>
                  <div class="col-md-3"><input class="form-control" id="empDocs" placeholder="Tài liệu: CCCD,HĐLĐ"></div>
                  <div class="col-12"><button class="btn btn-success">Lưu nhân viên</button></div>
                </form>
                <input class="form-control mb-2" id="employeeSearch" placeholder="RQ09: Tìm theo tên/mã/phòng ban/chức vụ">
                <div class="table-responsive"><table class="table table-sm" id="employeesTable"></table></div>
              </section>

              <section class="tab-pane fade" id="contracts">
                <h6>RQ12-RQ13 - Quản lý hợp đồng</h6>
                <form id="contractForm" class="row g-2 mb-3">
                  <div class="col-md-3"><input class="form-control" id="contractEmpCode" placeholder="Mã NV" required></div>
                  <div class="col-md-3"><select class="form-select" id="contractType"><option>Thử việc</option><option>Xác định thời hạn</option><option>Không xác định</option></select></div>
                  <div class="col-md-3"><input class="form-control" type="date" id="contractStart" required></div>
                  <div class="col-md-3"><input class="form-control" type="date" id="contractEnd" required></div>
                  <div class="col-12"><button class="btn btn-warning">Lưu hợp đồng</button></div>
                </form>
                <div class="table-responsive"><table class="table table-sm" id="contractsTable"></table></div>
                <div id="expiringAlert" class="small text-danger fw-semibold"></div>
              </section>

              <section class="tab-pane fade" id="reports">
                <h6>RQ16 - Báo cáo thống kê</h6>
                <div class="row g-3">
                  <div class="col-md-4"><div class="card card-body" id="reportTotal"></div></div>
                  <div class="col-md-4"><div class="card card-body" id="reportByStatus"></div></div>
                  <div class="col-md-4"><div class="card card-body" id="reportByDept"></div></div>
                </div>
              </section>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="toast" class="toast align-items-center text-bg-dark border-0 position-fixed bottom-0 end-0 m-3" role="alert">
      <div class="d-flex"><div class="toast-body" id="toastBody"></div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
